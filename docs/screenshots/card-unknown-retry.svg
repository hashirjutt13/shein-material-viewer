<svg width="760" height="460" viewBox="0 0 760 460" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Product card material unknown retry badge</title>
  <desc id="desc">Mock product card with a Material unknown badge and Retry button.</desc>
  <rect width="760" height="460" fill="#f1f5f9"/>
  <rect x="270" y="48" width="220" height="360" rx="8" fill="#fff" stroke="#d1d5db"/>
  <rect x="290" y="72" width="180" height="230" rx="6" fill="#e5e7eb"/>
  <rect x="320" y="120" width="120" height="130" rx="18" fill="#cbd5e1"/>
  <rect x="344" y="150" width="72" height="72" rx="14" fill="#f8fafc"/>
  <text x="290" y="333" font-family="Arial, sans-serif" font-size="13" fill="#111827">Phone Case Example</text>
  <text x="290" y="354" font-family="Arial, sans-serif" font-size="13" font-weight="700" fill="#111827">$3.99</text>
  <rect x="298" y="248" width="170" height="92" rx="6" fill="rgba(71,85,105,0.94)"/>
